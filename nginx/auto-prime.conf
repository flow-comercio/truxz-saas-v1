# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name truxz.com.br www.truxz.com.br *.truxz.com.br;
    return 301 https://$host$request_uri;
}

# ── Domínio principal ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name truxz.com.br www.truxz.com.br;

    ssl_certificate     /etc/letsencrypt/live/truxz.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truxz.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    client_max_body_size 10M;

    location /_next/static/ {
        alias /var/www/auto-prime/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/auto-prime/uploads/;
        expires 7d;
    }

    location / {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}

# ── Subdomínios (lojas) — wildcard *.truxz.com.br ──────────────────────
server {
    listen 443 ssl http2;
    server_name *.truxz.com.br;

    # Certificado WILDCARD (gerado com DNS challenge)
    ssl_certificate     /etc/letsencrypt/live/truxz.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truxz.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    client_max_body_size 10M;

    location /_next/static/ {
        alias /var/www/auto-prime/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/auto-prime/uploads/;
        expires 7d;
    }

    # Passa o host original para o Next.js detectar o subdomínio
    location / {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
